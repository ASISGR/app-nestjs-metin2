<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #0f3242;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background-color: #113c55;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #fff;
        }
        p {
            margin-bottom: 20px;
            color: #fff;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            text-decoration: none;
            background-color: #0f3242;
            color: #fff;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>{title}</h1>
        <p style="font-size: 16px; line-height: 150%">{content}</p>
        <a class="button" href="https://facebook.com/ReventonMetin2" title="Facebook-Reventon-Page" target="_blank">Facebook</a>
        <a class="button" href="{BASE_FRONT_URL}">Ιστοσελίδα</a>
    </div>
</body>
</html>
